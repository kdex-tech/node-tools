name: 'Publish Docker Image'
description: 'Publish Docker Image'

runs:
  using: "composite"
  steps:

  - name: Log in to registry with Docker
    shell: bash
    run: |
      echo "${{ github.token }}" | docker login ghcr.io/${{ github.repository }} -u ${{ github.actor }} --password-stdin

  # Register binfmt/QEMU so the non-native (arm64) RUN steps in the per-target
  # base build can execute under emulation on the amd64 runner. Required since
  # node-tools#5 dropped the FROM=$BUILDPLATFORM pin (which previously ran every
  # RUN natively on amd64, producing a mislabeled amd64 "arm64" image).
  - name: Set up QEMU
    uses: docker/setup-qemu-action@v3

  - name: Push image
    shell: bash
    run: |
      export REPOSITORY=ghcr.io
      export IMG=$(echo ${{ github.repository }} | tr '[A-Z]' '[a-z]')
      export TAG=$(echo ${{ github.ref }} | sed -e 's,.*/v\(.*\),\1,')
      make docker-buildx
